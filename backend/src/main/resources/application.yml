server:
  port: ${PORT:8080}

spring:
  application:
    name: symmes-fleet-backend
  autoconfigure:
    exclude: org.springframework.boot.autoconfigure.security.servlet.UserDetailsServiceAutoConfiguration

  datasource:
    url: jdbc:postgresql://${PGHOST:localhost}:${PGPORT:5432}/${PGDATABASE:symmes}?sslmode=${PGSSLMODE:require}
    username: ${PGUSER:symmes}
    password: ${PGPASSWORD:symmes}

  jpa:
    hibernate:
      ddl-auto: validate
    open-in-view: false
    properties:
      hibernate:
        format_sql: false

  flyway:
    enabled: true
    baseline-on-migrate: true

app:
  cors:
    allowed-origins: ${ALLOWED_ORIGINS:http://localhost:3000}
  jwt:
    secret: ${JWT_SECRET:dev-only-secret-change-me-dev-only-secret-change-me}
    expiration-minutes: ${JWT_EXPIRATION_MINUTES:480}
    customer-expiration-minutes: ${CUSTOMER_JWT_EXPIRATION_MINUTES:43200}
  booking:
    hold-minutes: ${BOOKING_HOLD_MINUTES:15}
  stripe:
    secret-key: ${STRIPE_SECRET_KEY:}
    webhook-secret: ${STRIPE_WEBHOOK_SECRET:}

management:
  endpoints:
    web:
      exposure:
        include: health
  endpoint:
    health:
      show-details: never

logging:
  level:
    com.symmesfleet.backend: INFO
