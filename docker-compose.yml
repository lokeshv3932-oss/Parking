services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: symmes
      POSTGRES_USER: symmes
      POSTGRES_PASSWORD: symmes
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U symmes"]
      interval: 5s
      timeout: 5s
      retries: 10

  backend:
    build:
      context: ./backend
    ports:
      - "8080:8080"
    environment:
      PGHOST: postgres
      PGPORT: 5432
      PGDATABASE: symmes
      PGUSER: symmes
      PGPASSWORD: symmes
      ALLOWED_ORIGINS: http://localhost:3000
      JWT_SECRET: local-dev-secret-change-me-local-dev-secret
      ADMIN_BOOTSTRAP_USERNAME: admin
      ADMIN_BOOTSTRAP_PASSWORD: changeme123
      STRIPE_SECRET_KEY: ${STRIPE_SECRET_KEY:-}
      STRIPE_WEBHOOK_SECRET: ${STRIPE_WEBHOOK_SECRET:-}
    depends_on:
      postgres:
        condition: service_healthy

volumes:
  postgres_data:
